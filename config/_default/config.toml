# Change baseurl before deploy
baseurl = "https://xunathan.github.io/"
locale  = "en-us"
title   = "AI Learning Blog"

# Theme i18n support
# See all available values at https://github.com/CaiJimmy/hugo-theme-stack/tree/master/i18n
defaultContentLanguage = "zh-cn"

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage = true

# Change it to your Disqus shortname before using
disqusShortname = "hugo-theme-stack"

[pagination]
    pagerSize = 5

comments:
  enabled: true
  provider: giscus

  giscus:
    repo: xunathan/xunathan.github.io
    repoID: R_kgDOSzRHjg
    category: Announcements
    categoryID: DIC_kwDOSzRHjs4C-4vI
    mapping: pathname
    reactionsEnabled: 1
    emitMetadata: 0
    inputPosition: top
    theme: preferred_color_scheme
